services:
  bot:
    build:
      context: .
      dockerfile: netra/Dockerfile
    env_file:
      - netra/.env
    ports:
      - "8000:8000"
    volumes:
      - ./netra/data:/app/data
      - ./netra/logs:/app/logs
    restart: always

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
