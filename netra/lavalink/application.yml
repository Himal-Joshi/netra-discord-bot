server:
  port: 2333
  address: 127.0.0.1
  http2:
    enabled: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - WEB              # OAuth-compatible — uses saved token
      - MUSIC            # YouTube Music client (WEB_REMIX internally)
      - IOS              # No-auth fallback
    oauth:
      enabled: true
      skipInitialization: true   # Token already obtained — won't prompt on restart

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
  pluginsDir: ./plugins
  server:
    password: "youshallnotpass"
    sources:
      youtube: false       # disabled — handled by youtube-source plugin above
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    bufferDurationMs: 4000
    frameBufferDurationMs: 8000
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

logging:
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: false
