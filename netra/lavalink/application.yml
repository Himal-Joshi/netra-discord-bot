server:
  port: 2333
  address: 127.0.0.1
  http2:
    enabled: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC              # Uses OAuth2 token — best for server IPs
      - WEB                # Uses OAuth2 token as fallback
      - TVHTML5EMBEDDED    # No-auth fallback
    oauth:
      enabled: true
      skipInitialization: false   # Lavalink will print a Google login URL on first start

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
  pluginsDir: ./plugins
  server:
    password: "youshallnotpass"
    sources:
      youtube: false       # disabled — handled by youtube-source plugin above
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

logging:
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: false
